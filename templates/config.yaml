# Hermes Agent Configuration
# Generated by evey-setup — edit freely after install
#
# Docs: https://github.com/NousResearch/hermes-agent

model: brain
model_context_length: 128000
toolsets:
- hermes-cli

provider: litellm
base_url: http://hermes-litellm:4000/v1
api_key_env: LITELLM_KEY

fallback:
  model: nemotron-free
  provider: litellm
  base_url: http://hermes-litellm:4000/v1

agent:
  max_turns: 90
  reasoning_effort: medium

terminal:
  backend: local
  cwd: .
  timeout: 180
  persistent_shell: true
  container_persistent: true

browser:
  inactivity_timeout: 120
  record_sessions: false

checkpoints:
  enabled: true
  max_snapshots: 50

# ── Compression ──────────────────────────────────────────────
# Compresses conversation when context usage exceeds threshold
compression:
  enabled: true
  threshold: 0.80
  summary_model: qwen35-4b
  summary_provider: litellm
  summary_base_url: http://hermes-litellm:4000/v1

# ── Smart Model Routing ─────────────────────────────────────
# Short/simple messages go to a cheaper model automatically
smart_model_routing:
  enabled: true
  max_simple_chars: 200
  max_simple_words: 35
  cheap_model:
    provider: litellm
    model: qwen35-4b
    base_url: http://hermes-litellm:4000/v1
    api_key_env: LITELLM_KEY

# ── Auxiliary Models ─────────────────────────────────────────
# Used for background tasks (compression, web extraction, etc.)
# Default to cheap local models to minimize cost
auxiliary:
  vision:
    provider: auto
    model: ''
    base_url: ''
    api_key: ''
  web_extract:
    provider: litellm
    model: qwen35-4b
    base_url: http://hermes-litellm:4000/v1
    api_key: ''
  compression:
    provider: litellm
    model: qwen35-4b
    base_url: http://hermes-litellm:4000/v1
    api_key: ''
  session_search:
    provider: litellm
    model: qwen35-4b
    base_url: http://hermes-litellm:4000/v1
    api_key: ''
  skills_hub:
    provider: litellm
    model: qwen35-4b
    base_url: http://hermes-litellm:4000/v1
    api_key: ''
  approval:
    provider: litellm
    model: qwen35-4b
    base_url: http://hermes-litellm:4000/v1
    api_key: ''
  mcp:
    provider: litellm
    model: qwen35-4b
    base_url: http://hermes-litellm:4000/v1
    api_key: ''
  flush_memories:
    provider: litellm
    model: qwen35-4b
    base_url: http://hermes-litellm:4000/v1
    api_key: ''

# ── Display ──────────────────────────────────────────────────
display:
  compact: false
  personality: kawaii
  resume_display: full
  bell_on_complete: false
  show_reasoning: false
  streaming: true
  show_cost: true
  skin: default

# ── Privacy ──────────────────────────────────────────────────
privacy:
  redact_pii: true

security:
  redact_secrets: true
  allow_private_urls: false  # set true only if agent needs local network access (see README)

# ── Delegation ───────────────────────────────────────────────
# Used when the agent delegates tasks to other models
delegation:
  model: brain
  provider: litellm
  base_url: http://hermes-litellm:4000/v1
  api_key: ''
  api_key_env: LITELLM_KEY
  max_iterations: 50
  default_toolsets:
    - terminal
    - file
    - web
    - memory

# ── Memory ───────────────────────────────────────────────────
memory:
  memory_enabled: true
  user_profile_enabled: true
  memory_char_limit: 3500
  user_char_limit: 2000

# ── Approvals ────────────────────────────────────────────────
# smart = auto-approve safe actions, ask for risky ones
approvals:
  mode: smart

# ── Telegram (optional) ─────────────────────────────────────
telegram:
  token_env: TELEGRAM_BOT_TOKEN

# ── Platform Toolsets ────────────────────────────────────────
platform_toolsets:
  telegram:
  - clarify
  - cronjob
  - delegation
  - file
  - memory
  - session_search
  - skills
  - terminal
  - todo
  - vision
  - web
  cli:
  - browser
  - clarify
  - code_execution
  - cronjob
  - delegation
  - file
  - image_gen
  - memory
  - session_search
  - skills
  - terminal
  - todo
  - tts
  - vision
  - web

# ── Quick Commands ───────────────────────────────────────────
quick_commands:
  services:
    type: exec
    command: echo 'LiteLLM:' && curl -sf http://hermes-litellm:4000/health/liveliness
      && echo ' OK' || echo ' DOWN'; echo 'Ollama:' && curl -sf http://localhost:11434/api/tags
      > /dev/null && echo ' OK' || echo ' DOWN'
  models:
    type: exec
    command: 'python3 -c "import urllib.request,json; r=json.loads(urllib.request.urlopen(''http://hermes-litellm:4000/v1/models'',timeout=5).read());
      [print(f''  {m[\"id\"]}'') for m in sorted(r.get(''data'',[]), key=lambda x:
      x[''id''])]"'
  gpu:
    type: exec
    command: curl -s http://localhost:11434/api/tags | python3 -c "import json,sys;
      [print(f'  {m[\"name\"]}') for m in json.load(sys.stdin).get('models',[])]"
  memory:
    type: exec
    command: cat ~/.hermes/memories/MEMORY.md 2>/dev/null || echo 'No memories yet'
  disk:
    type: exec
    command: 'df -h / | tail -1 | awk ''{print "Disk: " $3 " used / " $2 " total ("
      $5 " full)"}'''

# ── Disabled Skills ──────────────────────────────────────────
# Disable unused skills to reduce clutter and startup time
skills:
  disabled:
    - health-check
    - apple-notes
    - apple-reminders
    - arxiv
    - ascii-art
    - ascii-video
    - audiocraft-audio-generation
    - axolotl
    - blogwatcher
    - clip
    - codex
    - excalidraw
    - find-nearby
    - gif-search
    - google-workspace
    - guidance
    - heartmula
    - inference-sh-cli
    - jupyter-live-kernel
    - lambda-labs-gpu-cloud
    - linear
    - llava
    - minecraft-modpack-server
    - modal-serverless-gpu
    - notion
    - obsidian
    - openhue
    - pokemon-player
    - polymarket
    - powerpoint
    - segment-anything-model
    - songsee
    - stable-diffusion-image-generation
    - whisper
    - apple
    - gaming
    - gifs
    - leisure
    - music-creation
    - smart-home
    - social-media

personalities: {}

web:
  backend: parallel

human_delay:
  mode: 'off'

_config_version: 10
