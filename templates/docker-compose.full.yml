# Hermes Stack — Full Tier (10 Docker services)
# LiteLLM + MQTT + SearXNG + Qdrant + ntfy + n8n + Langfuse + Uptime Kuma
# hermes-agent and Ollama run natively (see setup-native.sh)
# Generated by evey-setup

x-logging: &default-logging
  driver: "json-file"
  options:
    max-size: "10m"
    max-file: "3"

x-extra-hosts: &extra-hosts
  extra_hosts:
    - "host.docker.internal:host-gateway"

services:
  # =============================================
  # AI PROXY
  # =============================================

  hermes-litellm:
    image: ghcr.io/berriai/litellm:main-latest
    container_name: hermes-litellm
    logging: *default-logging
    volumes:
      - ./config/litellm.yaml:/app/config.yaml
    environment:
      LITELLM_MASTER_KEY: ${LITELLM_MASTER_KEY}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY}
      LANGFUSE_PUBLIC_KEY: ${LANGFUSE_PUBLIC_KEY}
      LANGFUSE_SECRET_KEY: ${LANGFUSE_SECRET_KEY}
      LANGFUSE_HOST: http://hermes-langfuse:3000
      LITELLM_CALLBACKS: langfuse
    command: ["--config", "/app/config.yaml", "--port", "4000"]
    ports:
      - "127.0.0.1:4000:4000"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:4000/health/liveliness')\""]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    <<: *extra-hosts
    networks:
      - hermes-net
    restart: unless-stopped

  # =============================================
  # DATA & MESSAGING
  # =============================================

  hermes-mqtt:
    image: eclipse-mosquitto:2
    container_name: hermes-mqtt
    logging: *default-logging
    healthcheck:
      test: ["CMD-SHELL", "mosquitto_pub -h localhost -t healthcheck -m ok -q 0 2>/dev/null || exit 0"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    volumes:
      - ./config/mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf
      - ./data/mqtt:/mosquitto/data
    ports:
      - "127.0.0.1:1883:1883"
    <<: *extra-hosts
    networks:
      - hermes-net
    restart: unless-stopped

  hermes-searxng:
    image: searxng/searxng:latest
    container_name: hermes-searxng
    logging: *default-logging
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:8080/healthz 2>/dev/null"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    volumes:
      - ./config/searxng:/etc/searxng:rw
    environment:
      SEARXNG_BASE_URL: http://localhost:8888
    ports:
      - "127.0.0.1:8888:8080"
    <<: *extra-hosts
    networks:
      - hermes-net
    restart: unless-stopped

  hermes-qdrant:
    image: qdrant/qdrant:latest
    container_name: hermes-qdrant
    logging: *default-logging
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:6333/healthz 2>/dev/null || cat /proc/1/status > /dev/null"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    volumes:
      - ./data/qdrant:/qdrant/storage
    ports:
      - "127.0.0.1:6333:6333"
    <<: *extra-hosts
    networks:
      - hermes-net
    restart: unless-stopped

  hermes-ntfy:
    image: binwiederhier/ntfy:latest
    container_name: hermes-ntfy
    logging: *default-logging
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:80 2>/dev/null"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    volumes:
      - ./data/ntfy:/var/lib/ntfy
    command: serve
    ports:
      - "127.0.0.1:2586:80"
    <<: *extra-hosts
    networks:
      - hermes-net
    restart: unless-stopped

  # =============================================
  # WORKFLOW AUTOMATION
  # =============================================

  hermes-n8n:
    image: docker.n8n.io/n8nio/n8n:latest
    container_name: hermes-n8n
    logging: *default-logging
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:5678/healthz 2>/dev/null"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    volumes:
      - ./data/n8n:/home/node/.n8n
    environment:
      DB_TYPE: postgresdb
      DB_POSTGRESDB_HOST: hermes-n8n-db
      DB_POSTGRESDB_PORT: "5432"
      DB_POSTGRESDB_DATABASE: n8n
      DB_POSTGRESDB_USER: n8n
      DB_POSTGRESDB_PASSWORD: ${N8N_DB_PASSWORD}
      N8N_HOST: localhost
      N8N_PORT: "5678"
      N8N_PROTOCOL: http
      WEBHOOK_URL: http://hermes-n8n:5678/
      GENERIC_TIMEZONE: ${TZ:-UTC}
      TZ: ${TZ:-UTC}
      OPENAI_API_KEY: ${LITELLM_MASTER_KEY}
      OPENAI_BASE_URL: http://hermes-litellm:4000/v1
    ports:
      - "127.0.0.1:5678:5678"
    depends_on:
      hermes-n8n-db:
        condition: service_healthy
    <<: *extra-hosts
    networks:
      - hermes-net
    restart: unless-stopped

  hermes-n8n-db:
    image: postgres:16-alpine
    container_name: hermes-n8n-db
    logging: *default-logging
    volumes:
      - n8n-pgdata:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: n8n
      POSTGRES_USER: n8n
      POSTGRES_PASSWORD: ${N8N_DB_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U n8n"]
      interval: 10s
      timeout: 5s
      retries: 5
    <<: *extra-hosts
    networks:
      - hermes-net
    restart: unless-stopped

  # =============================================
  # OBSERVABILITY
  # =============================================

  hermes-langfuse:
    image: langfuse/langfuse:2
    container_name: hermes-langfuse
    logging: *default-logging
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:3000 2>/dev/null"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    environment:
      DATABASE_URL: postgresql://langfuse:${LANGFUSE_DB_PASSWORD}@hermes-langfuse-db:5432/langfuse
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
      NEXTAUTH_URL: http://localhost:3100
      SALT: ${LANGFUSE_SALT}
      TELEMETRY_ENABLED: "false"
    ports:
      - "127.0.0.1:3100:3000"
    depends_on:
      hermes-langfuse-db:
        condition: service_healthy
    <<: *extra-hosts
    networks:
      - hermes-net
    restart: unless-stopped

  hermes-langfuse-db:
    image: postgres:16-alpine
    container_name: hermes-langfuse-db
    logging: *default-logging
    volumes:
      - langfuse-pgdata:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: langfuse
      POSTGRES_USER: langfuse
      POSTGRES_PASSWORD: ${LANGFUSE_DB_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U langfuse"]
      interval: 10s
      timeout: 5s
      retries: 5
    <<: *extra-hosts
    networks:
      - hermes-net
    restart: unless-stopped

  hermes-uptimekuma:
    image: louislam/uptime-kuma:latest
    container_name: hermes-uptimekuma
    logging: *default-logging
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:3001 2>/dev/null"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    volumes:
      - ./data/uptimekuma:/app/data
    ports:
      - "127.0.0.1:3001:3001"
    <<: *extra-hosts
    networks:
      - hermes-net
    restart: unless-stopped

volumes:
  n8n-pgdata:
  langfuse-pgdata:

networks:
  hermes-net:
    driver: bridge
