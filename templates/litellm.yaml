# LiteLLM Proxy Configuration
# Generated by evey-setup — edit freely after install
#
# All API keys use os.environ/ syntax (resolved at runtime from .env)
# Add your own models: https://docs.litellm.ai/docs/providers

model_list:
  # ── BRAIN (primary model — MiMo-V2-Pro, FREE via OpenClaw) ──
  - model_name: brain
    litellm_params:
      model: openai/xiaomi/mimo-v2-pro
      api_key: os.environ/OPENROUTER_API_KEY
      api_base: https://openrouter.ai/api/v1
      extra_headers:
        HTTP-Referer: "https://openclaw.ai"
        X-OpenRouter-Title: "OpenClaw"
        X-OpenRouter-Categories: "cli-agent"
      extra_body:
        reasoning:
          exclude: true
      input_cost_per_token: 0
      output_cost_per_token: 0
    model_info:
      max_tokens: 128000

  # ── FREE MODELS (OpenRouter — no API credit needed) ──────────
  - model_name: nemotron-free
    litellm_params:
      model: openai/nvidia/nemotron-3-super-120b-a12b:free
      api_key: os.environ/OPENROUTER_API_KEY
      api_base: https://openrouter.ai/api/v1
    model_info:
      max_tokens: 262144

  - model_name: llama70b-free
    litellm_params:
      model: openai/meta-llama/llama-3.3-70b-instruct:free
      api_key: os.environ/OPENROUTER_API_KEY
      api_base: https://openrouter.ai/api/v1

  - model_name: step-flash-free
    litellm_params:
      model: openai/stepfun/step-3.5-flash:free
      api_key: os.environ/OPENROUTER_API_KEY
      api_base: https://openrouter.ai/api/v1
      extra_body:
        reasoning:
          exclude: true

  - model_name: qwen-coder-free
    litellm_params:
      model: openai/qwen/qwen3-coder:free
      api_key: os.environ/OPENROUTER_API_KEY
      api_base: https://openrouter.ai/api/v1
      extra_body:
        reasoning:
          exclude: true

  - model_name: gemma27b-free
    litellm_params:
      model: openai/google/gemma-3-27b-it:free
      api_key: os.environ/OPENROUTER_API_KEY
      api_base: https://openrouter.ai/api/v1

  - model_name: mistral-small-free
    litellm_params:
      model: openai/mistralai/mistral-small-3.1-24b-instruct:free
      api_key: os.environ/OPENROUTER_API_KEY
      api_base: https://openrouter.ai/api/v1

  - model_name: glm45-air-free
    litellm_params:
      model: openai/z-ai/glm-4.5-air:free
      api_key: os.environ/OPENROUTER_API_KEY
      api_base: https://openrouter.ai/api/v1
      extra_body:
        reasoning:
          exclude: true

  # ── PAID MODELS (uncomment if you have OpenRouter credits) ───
  # - model_name: deepseek-v3
  #   litellm_params:
  #     model: openai/deepseek/deepseek-v3.2
  #     api_key: os.environ/OPENROUTER_API_KEY
  #     api_base: https://openrouter.ai/api/v1
  #     input_cost_per_token: 0.00000025
  #     output_cost_per_token: 0.00000040

  # - model_name: gemini-flash
  #   litellm_params:
  #     model: openai/google/gemini-2.0-flash-001
  #     api_key: os.environ/OPENROUTER_API_KEY
  #     api_base: https://openrouter.ai/api/v1

  # ── LOCAL MODELS (Ollama — requires GPU, $0 cost) ────────────
  - model_name: hermes3-8b
    litellm_params:
      model: ollama/hermes3:8b
      api_base: http://hermes-ollama:11434
      input_cost_per_token: 0
      output_cost_per_token: 0

  - model_name: qwen35-4b
    litellm_params:
      model: ollama/qwen3.5:4b
      api_base: http://hermes-ollama:11434
      input_cost_per_token: 0
      output_cost_per_token: 0

  # ── CLOUDFLARE AI GATEWAY (optional — uncomment to enable) ───
  # Route OpenRouter traffic through CF for caching/analytics/rate limiting.
  # Set CF_AIG_AUTH_HEADER in .env, then change api_base on models above:
  #   api_base: https://gateway.ai.cloudflare.com/v1/${CF_ACCOUNT_ID}/${CF_GATEWAY_ID}/openrouter
  #   extra_headers:
  #     cf-aig-authorization: os.environ/CF_AIG_AUTH_HEADER

# ── FALLBACK CHAINS ──────────────────────────────────────────
# If brain fails, try these models in order
fallbacks:
  - brain: [nemotron-free, llama70b-free, step-flash-free]
  - nemotron-free: [llama70b-free, gemma27b-free]
  - llama70b-free: [nemotron-free, gemma27b-free]
  - qwen-coder-free: [step-flash-free, nemotron-free]

router_settings:
  routing_strategy: simple-shuffle

# ── BUDGET & LIMITS ──────────────────────────────────────────
litellm_settings:
  max_budget: 5.0
  budget_duration: 1d
  num_retries: 2
  retry_after: 5
  cache: true
  cache_params:
    type: "local"
    ttl: 300
    supported_call_types: ["acompletion", "completion"]
  # Uncomment for Langfuse cost tracking:
  # success_callback: ["langfuse"]
  # failure_callback: ["langfuse"]

general_settings:
  master_key: os.environ/LITELLM_MASTER_KEY
