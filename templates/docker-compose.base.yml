# Hermes Stack — Base Tier (1 Docker service)
# LiteLLM proxy — hermes-agent and Ollama run natively (see setup-native.sh)
# Generated by evey-setup

x-logging: &default-logging
  driver: "json-file"
  options:
    max-size: "10m"
    max-file: "3"

services:
  hermes-litellm:
    image: ghcr.io/berriai/litellm:main-latest
    container_name: hermes-litellm
    logging: *default-logging
    volumes:
      - ./config/litellm.yaml:/app/config.yaml
    environment:
      LITELLM_MASTER_KEY: ${LITELLM_MASTER_KEY}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY}
    command: ["--config", "/app/config.yaml", "--port", "4000"]
    ports:
      - "127.0.0.1:4000:4000"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:4000/health/liveliness')\""]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - hermes-net
    restart: unless-stopped

networks:
  hermes-net:
    driver: bridge
