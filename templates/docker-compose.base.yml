# Hermes Stack — Base Tier (3 services)
# hermes-agent + LiteLLM + Ollama
# Generated by evey-setup

x-logging: &default-logging
  driver: "json-file"
  options:
    max-size: "10m"
    max-file: "3"

services:
  hermes-agent:
    build:
      context: .
      dockerfile: src/hermes-agent/Dockerfile
    container_name: hermes-agent
    logging: *default-logging
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8642/health')\" 2>/dev/null || exit 0"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 30s
    volumes:
      - ./data/hermes:/home/hermes/.hermes
    environment:
      HERMES_PROVIDER: litellm
      LITELLM_BASE_URL: http://hermes-litellm:4000/v1
      LITELLM_KEY: ${LITELLM_MASTER_KEY}
      OPENAI_BASE_URL: http://hermes-litellm:4000/v1
      OPENAI_API_KEY: ${LITELLM_MASTER_KEY}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      DISCORD_BOT_TOKEN: ${DISCORD_BOT_TOKEN}
      API_SERVER_ENABLED: "true"
      API_SERVER_PORT: "8642"
      API_SERVER_HOST: "0.0.0.0"
      API_SERVER_KEY: ${API_SERVER_KEY}
      SESSION_IDLE_MINUTES: "240"
      SESSION_RESET_HOUR: "3"
      TZ: ${TZ:-UTC}
    depends_on:
      hermes-litellm:
        condition: service_healthy
      hermes-ollama:
        condition: service_started
    ports:
      - "127.0.0.1:8642:8642"
    networks:
      - hermes-net
    restart: unless-stopped

  hermes-litellm:
    image: ghcr.io/berriai/litellm:main-latest
    container_name: hermes-litellm
    logging: *default-logging
    volumes:
      - ./config/litellm.yaml:/app/config.yaml
    environment:
      LITELLM_MASTER_KEY: ${LITELLM_MASTER_KEY}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY}
    command: ["--config", "/app/config.yaml", "--port", "4000"]
    ports:
      - "127.0.0.1:4000:4000"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:4000/health/liveliness')\""]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - hermes-net
    restart: unless-stopped

  hermes-ollama:
    image: ollama/ollama:latest
    container_name: hermes-ollama
    logging: *default-logging
    healthcheck:
      test: ["CMD-SHELL", "cat /proc/1/status > /dev/null"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    volumes:
      - ollama-data:/root/.ollama
    environment:
      OLLAMA_KEEP_ALIVE: "30m"
      OLLAMA_MAX_LOADED_MODELS: "2"
      OLLAMA_NUM_PARALLEL: "2"
      OLLAMA_FLASH_ATTENTION: "1"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    ports:
      - "127.0.0.1:11434:11434"
    networks:
      - hermes-net
    restart: unless-stopped

volumes:
  ollama-data:

networks:
  hermes-net:
    driver: bridge
