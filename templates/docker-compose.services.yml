# Hermes Stack — Services Tier (5 Docker services)
# LiteLLM + MQTT + SearXNG + Qdrant + ntfy
# hermes-agent and Ollama run natively (see setup-native.sh)
# Generated by evey-setup

x-logging: &default-logging
  driver: "json-file"
  options:
    max-size: "10m"
    max-file: "3"

x-extra-hosts: &extra-hosts
  extra_hosts:
    - "host.docker.internal:host-gateway"

services:
  hermes-litellm:
    image: ghcr.io/berriai/litellm:main-latest
    container_name: hermes-litellm
    logging: *default-logging
    volumes:
      - ./config/litellm.yaml:/app/config.yaml
    environment:
      LITELLM_MASTER_KEY: ${LITELLM_MASTER_KEY}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY}
    command: ["--config", "/app/config.yaml", "--port", "4000"]
    ports:
      - "127.0.0.1:4000:4000"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:4000/health/liveliness')\""]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    <<: *extra-hosts
    networks:
      - hermes-net
    restart: unless-stopped

  hermes-mqtt:
    image: eclipse-mosquitto:2
    container_name: hermes-mqtt
    logging: *default-logging
    healthcheck:
      test: ["CMD-SHELL", "mosquitto_pub -h localhost -t healthcheck -m ok -q 0 2>/dev/null || exit 0"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    volumes:
      - ./config/mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf
      - ./data/mqtt:/mosquitto/data
    ports:
      - "127.0.0.1:1883:1883"
    <<: *extra-hosts
    networks:
      - hermes-net
    restart: unless-stopped

  hermes-searxng:
    image: searxng/searxng:latest
    container_name: hermes-searxng
    logging: *default-logging
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:8080/healthz 2>/dev/null"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    volumes:
      - ./config/searxng:/etc/searxng:rw
    environment:
      SEARXNG_BASE_URL: http://localhost:8888
    ports:
      - "127.0.0.1:8888:8080"
    <<: *extra-hosts
    networks:
      - hermes-net
    restart: unless-stopped

  hermes-qdrant:
    image: qdrant/qdrant:latest
    container_name: hermes-qdrant
    logging: *default-logging
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:6333/healthz 2>/dev/null || cat /proc/1/status > /dev/null"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    volumes:
      - ./data/qdrant:/qdrant/storage
    ports:
      - "127.0.0.1:6333:6333"
    <<: *extra-hosts
    networks:
      - hermes-net
    restart: unless-stopped

  hermes-ntfy:
    image: binwiederhier/ntfy:latest
    container_name: hermes-ntfy
    logging: *default-logging
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:80 2>/dev/null"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    volumes:
      - ./data/ntfy:/var/lib/ntfy
    command: serve
    ports:
      - "127.0.0.1:2586:80"
    <<: *extra-hosts
    networks:
      - hermes-net
    restart: unless-stopped

networks:
  hermes-net:
    driver: bridge
